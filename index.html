<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI MONSTER</title>
  <link rel="stylesheet" href="engine/style.css">
</head>
<body>
  <div id="app">

    <!-- 進行度表示(ゲーム中のみ表示) -->
    <header id="hud" hidden>
      <div id="hud-icons" aria-label="クエストの進行状況"></div>
      <div id="hud-power" hidden></div>
      <div id="hud-count"></div>
    </header>

    <!-- [1] タイトル画面 -->
    <section id="screen-title" class="screen">
      <div id="title-logo"></div>
      <h1 id="title-heading"></h1>
      <p id="title-sub"></p>
      <button id="btn-start" class="btn-big" hidden></button>
      <div id="guide" hidden></div>
    </section>

    <!-- [2a] ゲーム画面(questモード:横スクロールRPG風) -->
    <section id="screen-game" class="screen" hidden>
      <div id="field">
        <div id="world"></div>
        <div id="hero"></div>
        <div id="tap-hint">タップで すすむ!</div>
      </div>
    </section>

    <!-- [2b] ゲーム画面(runnerモード:群衆ランナー風・宇宙) -->
    <section id="screen-runner" class="screen" hidden>
      <div id="stars"></div>
      <div id="road"><div id="road-surface"></div></div>
      <div id="crowd"></div>
      <div id="foe" hidden></div>
      <div id="gates" hidden></div>
    </section>

    <!-- [4] クリア画面 -->
    <section id="screen-clear" class="screen" hidden>
      <div id="clear-fx" aria-hidden="true"></div>
      <h2 id="clear-title"></h2>
      <p id="clear-message"></p>
      <a id="clear-cta" class="btn-big" href="#"></a>
      <p id="submit-note"></p>
    </section>

    <!-- お知らせ表示(両モード共通) -->
    <div id="banner" hidden></div>

  </div>

  <!-- [3] 質問モーダル(画面に重なる質問ウィンドウ) -->
  <div id="modal" hidden></div>

  <noscript><p style="padding:16px">このページの表示にはJavaScript(ブラウザでプログラムを動かす仕組み)が必要です。</p></noscript>

  <script src="engine/questions.js"></script>
  <script src="engine/submit.js"></script>
  <script src="engine/engine.js"></script>
</body>
</html>
